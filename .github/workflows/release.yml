name: Release

# Publish a GitHub release when a version tag is pushed. Packagist picks up the
# new version from the tag via its webhook; the prebuilt libraries already live
# in the repo (lib/<platform>/), so there are no build artifacts to attach.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: github release · ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for auto-generated notes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease=""
          case "${GITHUB_REF_NAME}" in
            *-*) prerelease="--prerelease" ;;
          esac

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            ${prerelease}
