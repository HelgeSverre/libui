name: Release Build

# Build libui binaries for Linux and Windows and attach to GitHub releases
#
# NOTE: macOS darwin libui.dylib is prebuilt and committed in the repo.
# This workflow only builds Linux and Windows artifacts.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libgtk-3-dev

      - name: Build libui
        run: bash build-libui.sh

      - name: Verify artifact
        run: |
          ls -la lib/linux-x86_64/libui.so
          file lib/linux-x86_64/libui.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libui-linux-x86_64
          path: lib/linux-x86_64/libui.so
          retention-days: 7

  build-linux-aarch64:
    name: Build Linux ARM64
    # Build natively on an arm64 runner — the previous x86_64 cross-compile with a
    # hand-rolled meson cross-file was brittle and broke. Mirrors build-native.yml.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libgtk-3-dev

      - name: Build libui
        run: bash build-libui.sh

      - name: Verify artifact
        run: |
          ls -la lib/linux-aarch64/libui.so
          file lib/linux-aarch64/libui.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libui-linux-aarch64
          path: lib/linux-aarch64/libui.so
          retention-days: 7

  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Python and pip
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: pip install meson ninja

      # libui-ng only builds a shared DLL with MSVC (MinGW is static-only).
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build libui
        shell: bash
        run: |
          # Git Bash's GNU /usr/bin/link.exe shadows MSVC's linker on PATH.
          rm -f /usr/bin/link /usr/bin/link.exe || true
          bash build-libui.sh

      - name: Verify artifact
        shell: bash
        run: |
          ls -la lib/windows-x86_64/libui.dll
          file lib/windows-x86_64/libui.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libui-windows-x86_64
          path: lib/windows-x86_64/libui.dll
          retention-days: 7

  attach-artifacts:
    name: Attach artifacts to the release
    needs: [build-linux-x86_64, build-linux-aarch64, build-windows-x86_64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "libui.*" -exec ls -la {} \;

      # The GitHub release itself is created by release.yml; here we only attach
      # the built libraries to it (--clobber so re-runs replace, not duplicate).
      - name: Upload artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ github.ref_name }}
          if [ -z "$TAG" ]; then
            TAG=${{ inputs.tag }}
          fi

          echo "Attaching artifacts to release: $TAG"

          gh release upload "$TAG" \
            artifacts/libui-linux-x86_64/libui.so \
            artifacts/libui-linux-aarch64/libui.so \
            artifacts/libui-windows-x86_64/libui.dll \
            --clobber
