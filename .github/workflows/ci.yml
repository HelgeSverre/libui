name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Code style — Mago formatter check + linter.
  style:
    name: code style · mago
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.5']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: Check formatting
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: composer format:check
      - name: Lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: composer lint

  # Static analysis + generator/header gate (no GUI needed).
  static:
    name: phpstan + gate
    runs-on: macos-latest
    strategy:
      matrix:
        php: ['8.5']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          ini-values: ffi.enable=1
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - name: PHPStan
        run: composer stan
      - name: Header gate (FFI::cdef accepts the generated header)
        run: composer gate

  # Build libui on each real OS/arch and run the full suite against it. macOS
  # uses the committed universal dylib; Linux/Windows build from source. GUI
  # tests run headless on Linux via xvfb.
  test:
    name: test · ${{ matrix.label }} · PHP ${{ matrix.php }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     label: darwin-arm64,      php: '8.5' }
          - { os: ubuntu-latest,    label: linux-x86_64,     php: '8.5' }
          - { os: ubuntu-24.04-arm, label: linux-aarch64,     php: '8.5' }
          - { os: windows-latest,   label: windows-x86_64,   php: '8.5' }
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          ini-values: ffi.enable=1
          coverage: none

      # macOS runners are arm64 (macos-latest = Apple Silicon). We deliberately do
      # NOT test the Intel (macos-13) runner — it is slow and the committed dylib is
      # already a universal arm64+x86_64 binary covered by the arm64 job.
      - name: Show runner architecture
        shell: bash
        run: uname -m

      - name: Build toolchain + GTK 3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build libgtk-3-dev xvfb

      - name: Build toolchain (Windows)
        if: runner.os == 'Windows'
        run: pip install meson ninja

      # libui-ng only builds a shared DLL with MSVC (not MinGW), and FFI needs a
      # shared library — so set up the Visual Studio toolchain for the build below.
      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build libui from source (Linux/Windows)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          # Git Bash ships a GNU coreutils `link` in /usr/bin that shadows MSVC's
          # link.exe on PATH and breaks meson's MSVC detection. Remove it (the
          # runner is ephemeral) so the Visual Studio linker wins.
          if [ "$RUNNER_OS" = "Windows" ]; then
            rm -f /usr/bin/link /usr/bin/link.exe || true
          fi
          bash build-libui.sh

      - run: composer install --no-interaction --prefer-dist --no-progress

      - name: Test suite
        shell: bash
        # NO_AT_BRIDGE/GTK_A11Y silence the headless-GTK AT-SPI warning so it can't
        # corrupt PHPUnit's RunInSeparateProcess result serialization (menu tests).
        env:
          NO_AT_BRIDGE: '1'
          GTK_A11Y: none
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a composer test
          else
            composer test
          fi
